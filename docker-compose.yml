services:

  # ─── Rovio (Next.js) ──────────────────────────────────────────
  rovio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rovio-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    environment:
      - NODE_ENV=production
      - LEMU_AUTH_URL=http://lemu-auth:5000
    depends_on:
      lemu-auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      retries: 3
      start_period: 30s

  # ─── lemu-auth (Express) ──────────────────────────────────────
  lemu-auth:
    build:
      context: ../lemu-auth
      dockerfile: Dockerfile
    container_name: lemu-auth
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ../lemu-auth/.env.docker
    environment:
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      retries: 3
      start_period: 30s

  lemu-worker:
    build:
      context: ../lemu-auth
      dockerfile: Dockerfile
    container_name: lemu-worker
    restart: unless-stopped
    command: ["node", "src/delivery/workers/mail.worker.js"]
    env_file:
      - ../lemu-auth/.env.docker
    environment:
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy

  # ─── MongoDB ──────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: rovio-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      retries: 5
      start_period: 20s

  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rovio-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
      start_period: 10s

volumes:
  mongodb_data:
  redis_data:
