services:

  # ─── Rovio Web (Next.js) ──────────────────────────────────────
  rovio-web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    container_name: rovio-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./apps/web/.env.docker
    environment:
      - NODE_ENV=production
      - API_URL=http://rovio-api:5000
    depends_on:
      rovio-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      retries: 3
      start_period: 30s

  # ─── Rovio API (Express) ─────────────────────────────────────
  rovio-api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: rovio-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./apps/api/.env.docker
    environment:
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      retries: 3
      start_period: 30s

  # ─── Mail Worker ──────────────────────────────────────────────
  rovio-worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: rovio-worker
    restart: unless-stopped
    command: ["node", "dist/delivery/workers/mail.worker.js"]
    env_file:
      - ./apps/api/.env.docker
    environment:
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy

  # ─── MongoDB ──────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: rovio-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      retries: 5
      start_period: 20s

  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rovio-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
      start_period: 10s

volumes:
  mongodb_data:
  redis_data:
